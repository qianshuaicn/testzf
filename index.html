<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>赞助小窝</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="wechatTip">
⚠ 当前在微信内浏览，请点击右上角 → 在浏览器打开即可使用支付宝打赏
</div>

<div class="container">

<img src="images/logo.png" class="avatar">

<h2>🍜感谢您的投喂🍚</h2>

<p class="desc">如果我的文章帮助到了你，可以请我喝一杯咖啡 ☕</p>

<div class="pay-methods">

<button onclick="openPay('alipay')">支付宝</button>
<button onclick="openPay('wechat')">微信</button>
<button onclick="openPay('qq')">QQ</button>

</div>

</div>


<div id="modal">

<div class="modal-box">

<span class="close" onclick="closeModal()">×</span>

<h3 id="payTitle"></h3>

<div class="amount-list" id="amountList">

<button onclick="pay(5)">5</button>
<button onclick="pay(10)">10</button>
<button onclick="pay(20)">20</button>
<button onclick="pay(50)">50</button>

</div>

<img id="qr" class="qr">

<a id="openBtn" target="_blank">打开APP支付</a>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
